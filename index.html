<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1208">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jasstafel">
  <link rel="manifest" href="manifest.json">
  <title>Jasstafel</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0c07;
      --felt: #1c3a2a;
      --felt-light: #224533;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: #7a6230;
      --cream: #f0e6c8;
      --cream-dim: #9a8e72;
      --red: #c0392b;
      --red-light: #e74c3c;
      --white: #fff9f0;
      --shadow: rgba(0,0,0,0.6);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      position: relative;
    }

    /* Felt texture background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(28,58,42,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(28,58,42,0.3) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 20px 0 16px;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-top: 16px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 0.04em;
      text-shadow: 0 2px 12px rgba(201,168,76,0.4);
      line-height: 1;
    }

    .logo span {
      color: var(--red-light);
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--cream-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── SUIT ICONS ── */
    .suits {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 6px;
      font-size: 1.1rem;
    }

    .suits span { opacity: 0.7; }

    /* ── SETUP SCREEN ── */
    #setup-screen {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 24px;
    }

    .setup-section {
      background: rgba(28,58,42,0.35);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 20px;
    }

    .setup-section h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mode-btn {
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(201,168,76,0.25);
      border-radius: 10px;
      padding: 14px 10px;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .mode-btn:active, .mode-btn.selected {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .mode-btn .mode-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .mode-btn .mode-label { font-size: 0.85rem; display: block; color: var(--cream-dim); }

    .team-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .team-input-group { display: flex; flex-direction: column; gap: 6px; }

    .team-input-group label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold-dim);
    }

    .team-input-group input {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
      width: 100%;
      outline: none;
    }

    .team-input-group input:focus {
      border-color: var(--gold);
    }

    .target-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .target-btn {
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(201,168,76,0.25);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .target-btn.selected {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .start-btn {
      background: linear-gradient(135deg, #8b6914, var(--gold), #8b6914);
      border: none;
      border-radius: var(--radius);
      padding: 18px;
      color: #0f0c07;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .start-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(201,168,76,0.2);
    }

    .resume-btn {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.15s;
    }

    .resume-btn:active {
      background: rgba(201,168,76,0.1);
      color: var(--cream);
    }

    /* ── GAME SCREEN ── */
    #game-screen { display: none; }

    .score-target {
      text-align: center;
      font-size: 0.8rem;
      color: var(--cream-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── SCOREBOARD ── */
    .scoreboard {
      background: rgba(28,58,42,0.35);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .scoreboard-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.3);
    }

    .team-header {
      padding: 14px 16px;
      text-align: center;
      position: relative;
    }

    .team-header:first-child {
      border-right: 1px solid rgba(201,168,76,0.15);
    }

    .team-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--gold-light);
      font-weight: 700;
    }

    .team-total {
      font-size: 2.8rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--white);
      line-height: 1.1;
      text-shadow: 0 0 20px rgba(255,255,255,0.15);
    }

    .team-total.winning { color: var(--gold-light); text-shadow: 0 0 20px rgba(201,168,76,0.4); }
    .team-total.losing { color: var(--cream-dim); }

    .progress-bar-wrap {
      height: 4px;
      background: rgba(0,0,0,0.4);
      margin: 0 16px 12px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Round history */
    .rounds-wrap {
      max-height: 220px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .round-row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr;
      align-items: center;
      padding: 7px 12px;
      border-top: 1px solid rgba(201,168,76,0.07);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

    .round-row:nth-child(even) { background: rgba(0,0,0,0.15); }

    .round-num {
      font-size: 0.72rem;
      color: var(--gold-dim);
      font-variant-numeric: tabular-nums;
    }

    .round-score {
      text-align: center;
      font-size: 1.05rem;
      font-variant-numeric: tabular-nums;
      color: var(--cream);
    }

    .round-score.highlight { color: var(--gold-light); font-weight: 600; }

    .round-score.match-bonus {
      color: var(--red-light);
      font-weight: 700;
    }

    /* ── ENTRY PANEL ── */
    .entry-panel {
      background: rgba(28,58,42,0.35);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .entry-panel h3 {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .entry-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .entry-group { display: flex; flex-direction: column; gap: 5px; }

    .entry-group label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
    }

    .score-input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      padding: 12px;
      color: var(--white);
      font-family: 'Crimson Pro', serif;
      font-size: 1.4rem;
      font-weight: 600;
      width: 100%;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
    }

    .score-input:focus { border-color: var(--gold); background: rgba(0,0,0,0.55); }

    .quick-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .quick-btn {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:active {
      background: rgba(201,168,76,0.2);
      color: var(--gold-light);
      border-color: var(--gold);
    }

    .match-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .match-btn {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(192,57,43,0.3);
      border-radius: 8px;
      padding: 10px 6px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .match-btn.active {
      background: rgba(192,57,43,0.25);
      border-color: var(--red-light);
      color: var(--red-light);
    }

    .match-btn .match-icon { display: block; font-size: 1.1rem; }

    /* ── FAKTOR ── */
    .factor-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .factor-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      white-space: nowrap;
    }

    .factor-btn {
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(201,168,76,0.25);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 44px;
      text-align: center;
    }

    .factor-btn.selected {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .add-round-btn {
      background: linear-gradient(135deg, #1c4a30, #2d6b45);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 10px;
      padding: 14px;
      color: var(--gold-light);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }

    .add-round-btn:active { transform: scale(0.97); opacity: 0.85; }

    /* ── BOTTOM ACTIONS ── */
    .bottom-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .action-btn {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 12px 8px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .action-btn:active { background: rgba(255,255,255,0.08); color: var(--cream); }
    .action-btn .icon { display: block; font-size: 1.2rem; margin-bottom: 2px; }

    /* ── WIN OVERLAY ── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
    }

    #win-overlay.show { display: flex; }

    .win-card {
      background: linear-gradient(160deg, #1c3a2a, #0f1f16);
      border: 2px solid var(--gold);
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 0 60px rgba(201,168,76,0.25);
    }

    .win-trophy { font-size: 4rem; margin-bottom: 8px; }

    .win-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }

    .win-team {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--gold-light);
      margin-bottom: 12px;
    }

    .win-score {
      font-size: 1rem;
      color: var(--cream-dim);
      margin-bottom: 24px;
    }

    .win-btn {
      background: linear-gradient(135deg, #8b6914, var(--gold), #8b6914);
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      color: #0f0c07;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 50;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: #141a12;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px 20px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 480px;
    }

    .modal h3 {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light);
      margin-bottom: 16px;
    }

    .modal p { color: var(--cream-dim); margin-bottom: 20px; font-size: 0.95rem; }

    .modal-btns { display: flex; gap: 10px; }

    .modal-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 10px;
      padding: 12px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      cursor: pointer;
    }

    .modal-confirm {
      flex: 1;
      background: var(--red);
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: var(--white);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      align-items: center;
      gap: 12px;
    }

    #install-banner.show { display: flex; }
    #install-banner p { flex: 1; font-size: 0.85rem; color: var(--cream-dim); }
    #install-banner button {
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      color: #0f0c07;
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Jass<span>tafel</span></div>
    <div class="subtitle">Schweizer Kartenspiel</div>
    <div class="suits">♠ ♥ ♦ ♣</div>
  </header>

  <div id="install-banner">
    <p>📲 Zum Home-Bildschirm hinzufügen für Offline-Nutzung</p>
    <button onclick="installApp()">Installieren</button>
  </div>

  <!-- SETUP SCREEN -->
  <div id="setup-screen">
    <div class="setup-section">
      <h3>Spielmodus</h3>
      <div class="mode-grid">
        <button class="mode-btn selected" data-mode="schieber" onclick="selectMode(this)">
          <span class="mode-icon">🃏</span>
          <span>Schieber</span>
          <span class="mode-label">2 × 2 Spieler</span>
        </button>
        <button class="mode-btn" data-mode="differenzler" onclick="selectMode(this)">
          <span class="mode-icon">🎯</span>
          <span>Differenzler</span>
          <span class="mode-label">Einzelpunkte</span>
        </button>
        <button class="mode-btn" data-mode="coiffeur" onclick="selectMode(this)">
          <span class="mode-icon">✂️</span>
          <span>Coiffeur</span>
          <span class="mode-label">Auftrag wählen</span>
        </button>
        <button class="mode-btn" data-mode="molotov" onclick="selectMode(this)">
          <span class="mode-icon">💣</span>
          <span>Molotov</span>
          <span class="mode-label">Alle Modi</span>
        </button>
      </div>
    </div>

    <div class="setup-section">
      <h3>Teamnamen</h3>
      <div class="team-inputs">
        <div class="team-input-group">
          <label>Team 1</label>
          <input id="team1-name" type="text" placeholder="Team 1" maxlength="12" value="Team 1">
        </div>
        <div class="team-input-group">
          <label>Team 2</label>
          <input id="team2-name" type="text" placeholder="Team 2" maxlength="12" value="Team 2">
        </div>
      </div>
    </div>

    <div class="setup-section">
      <h3>Ziel (Punkte)</h3>
      <div class="target-options">
        <button class="target-btn" data-target="1000" onclick="selectTarget(this)">1000</button>
        <button class="target-btn selected" data-target="1500" onclick="selectTarget(this)">1500</button>
        <button class="target-btn" data-target="2000" onclick="selectTarget(this)">2000</button>
        <button class="target-btn" data-target="2500" onclick="selectTarget(this)">2500</button>
        <button class="target-btn" data-target="0" onclick="selectTarget(this)">Kein Ziel</button>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">Spiel starten ♠</button>
    <button class="resume-btn" id="resume-btn" onclick="resumeGame()" style="display:none">↩ Zum laufenden Spiel zurück</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="score-target" id="target-display"></div>

    <div class="scoreboard">
      <div class="scoreboard-header">
        <div class="team-header">
          <div class="team-name" id="t1-name">Team 1</div>
          <div class="team-total" id="t1-total">0</div>
          <div class="progress-bar-wrap"><div class="progress-bar" id="t1-bar" style="width:0%"></div></div>
        </div>
        <div class="team-header">
          <div class="team-name" id="t2-name">Team 2</div>
          <div class="team-total" id="t2-total">0</div>
          <div class="progress-bar-wrap"><div class="progress-bar" id="t2-bar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="rounds-wrap" id="rounds-list"></div>
    </div>

    <div class="entry-panel">
      <h3>Runde eintragen</h3>
      <div class="entry-row">
        <div class="entry-group">
          <label id="t1-label">Team 1</label>
          <input class="score-input" id="score1" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" min="0" max="157" oninput="autoBalance(1)">
        </div>
        <div class="entry-group">
          <label id="t2-label">Team 2</label>
          <input class="score-input" id="score2" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" min="0" max="157" oninput="autoBalance(2)">
        </div>
      </div>

      <div class="quick-btns">
        <span style="font-size:0.72rem;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;align-self:center;">Schnell:</span>
        <button class="quick-btn" onclick="setScore(1, 157)">157 ▸ 0</button>
        <button class="quick-btn" onclick="setScore(2, 157)">0 ◂ 157</button>
        <button class="quick-btn" onclick="setScore(1, 100)">100/57</button>
        <button class="quick-btn" onclick="setScore(1, 77)">77/80</button>
      </div>

      <div class="factor-row">
        <span class="factor-label">Faktor:</span>
        <button class="factor-btn selected" data-factor="1" onclick="selectFactor(this)">1×</button>
        <button class="factor-btn" data-factor="2" onclick="selectFactor(this)">2×</button>
        <button class="factor-btn" data-factor="3" onclick="selectFactor(this)">3×</button>
        <button class="factor-btn" data-factor="4" onclick="selectFactor(this)">4×</button>
      </div>

      <div class="match-row">
        <button class="match-btn" id="match1-btn" onclick="toggleMatch(1)">
          <span class="match-icon">💥</span>
          Match T1
        </button>
        <button class="match-btn" id="match2-btn" onclick="toggleMatch(2)">
          <span class="match-icon">💥</span>
          Match T2
        </button>
      </div>

      <button class="add-round-btn" onclick="addRound()">✓ Runde speichern</button>
    </div>

    <div class="bottom-actions">
      <button class="action-btn" onclick="undoRound()">
        <span class="icon">↩️</span>
        Rückgängig
      </button>
      <button class="action-btn" onclick="showSetup()">
        <span class="icon">🔄</span>
        Neues Spiel
      </button>
    </div>
  </div>
</div>

<!-- Win Overlay -->
<div id="win-overlay">
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <div class="win-title">Gewinner</div>
    <div class="win-team" id="win-team-name">Team 1</div>
    <div class="win-score" id="win-score-display"></div>
    <button class="win-btn" onclick="closeWin()">Weiter spielen</button>
  </div>
</div>



<script>
  // ── STATE ──
  let state = {
    mode: 'schieber',
    team1: 'Team 1',
    team2: 'Team 2',
    target: 1500,
    scores: [], // [{s1, s2, match1, match2, factor}]
    matchTeam: 0, // 0 = none, 1 = team1, 2 = team2
    currentFactor: 1
  };

  // Load saved state
  const saved = localStorage.getItem('jasstafel_state');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      if (state.scores && state.scores.length >= 0 && state.team1) {
        startGame(true);
      }
    } catch(e) {}
  }

  function saveState() {
    localStorage.setItem('jasstafel_state', JSON.stringify(state));
  }

  // ── SETUP ──
  function selectMode(btn) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.mode = btn.dataset.mode;
  }

  function selectFactor(btn) {
    document.querySelectorAll('.factor-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.currentFactor = parseInt(btn.dataset.factor);
  }

  function selectTarget(btn) {
    document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.target = parseInt(btn.dataset.target);
  }

  function startGame(restore = false) {
    if (!restore) {
      state.team1 = document.getElementById('team1-name').value.trim() || 'Team 1';
      state.team2 = document.getElementById('team2-name').value.trim() || 'Team 2';
      state.scores = [];
      state.matchTeam = 0;
    }

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';

    document.getElementById('t1-name').textContent = state.team1;
    document.getElementById('t2-name').textContent = state.team2;
    document.getElementById('t1-label').textContent = state.team1;
    document.getElementById('t2-label').textContent = state.team2;

    if (state.target > 0) {
      document.getElementById('target-display').textContent = `Ziel: ${state.target} Punkte · ${state.mode.charAt(0).toUpperCase() + state.mode.slice(1)}`;
    } else {
      document.getElementById('target-display').textContent = state.mode.charAt(0).toUpperCase() + state.mode.slice(1);
    }

    renderGame();
    saveState();
  }

  function showSetup() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('team1-name').value = state.team1;
    document.getElementById('team2-name').value = state.team2;
    // Show "Zurück zum Spiel" only if a game is running
    const hasGame = state.scores && state.scores.length > 0;
    document.getElementById('resume-btn').style.display = hasGame ? 'block' : 'none';
  }

  function resumeGame() {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
  }

  // ── GAME LOGIC ──
  function getTotal(team) {
    return state.scores.reduce((sum, r) => {
      const factor = r.factor || 1;
      const base = team === 1 ? r.s1 : r.s2;
      const matchBonus = r.match1 && team === 1 ? 100 : (r.match2 && team === 2 ? 100 : 0);
      return sum + (base + matchBonus) * factor;
    }, 0);
  }

  function renderGame() {
    const t1 = getTotal(1);
    const t2 = getTotal(2);

    document.getElementById('t1-total').textContent = t1;
    document.getElementById('t2-total').textContent = t2;

    // Colors
    const t1El = document.getElementById('t1-total');
    const t2El = document.getElementById('t2-total');
    t1El.className = 'team-total' + (t1 > t2 ? ' winning' : t1 < t2 ? ' losing' : '');
    t2El.className = 'team-total' + (t2 > t1 ? ' winning' : t2 < t1 ? ' losing' : '');

    // Progress bars
    if (state.target > 0) {
      document.getElementById('t1-bar').style.width = Math.min(100, t1 / state.target * 100) + '%';
      document.getElementById('t2-bar').style.width = Math.min(100, t2 / state.target * 100) + '%';
    } else {
      const max = Math.max(t1, t2, 1);
      document.getElementById('t1-bar').style.width = (t1 / max * 100) + '%';
      document.getElementById('t2-bar').style.width = (t2 / max * 100) + '%';
    }

    // Rounds list
    const list = document.getElementById('rounds-list');
    list.innerHTML = '';
    [...state.scores].reverse().forEach((r, i) => {
      const roundNum = state.scores.length - i;
      const row = document.createElement('div');
      row.className = 'round-row';

      const numEl = document.createElement('div');
      numEl.className = 'round-num';
      numEl.textContent = roundNum + (r.factor > 1 ? ` ×${r.factor}` : '');

      const s1El = document.createElement('div');
      s1El.className = 'round-score' + (r.s1 > r.s2 ? ' highlight' : '') + (r.match1 ? ' match-bonus' : '');
      s1El.textContent = r.match1 ? `${r.s1} 💥` : r.s1;

      const s2El = document.createElement('div');
      s2El.className = 'round-score' + (r.s2 > r.s1 ? ' highlight' : '') + (r.match2 ? ' match-bonus' : '');
      s2El.textContent = r.match2 ? `${r.s2} 💥` : r.s2;

      row.appendChild(numEl);
      row.appendChild(s1El);
      row.appendChild(s2El);
      list.appendChild(row);
    });
  }

  function autoBalance(changed) {
    if (changed === 1) {
      const s1 = parseInt(document.getElementById('score1').value);
      if (!isNaN(s1) && s1 >= 0 && s1 <= 157) {
        document.getElementById('score2').value = 157 - s1;
      }
    } else {
      const s2 = parseInt(document.getElementById('score2').value);
      if (!isNaN(s2) && s2 >= 0 && s2 <= 157) {
        document.getElementById('score1').value = 157 - s2;
      }
    }
  }

  function setScore(winTeam, pts) {
    if (winTeam === 1) {
      document.getElementById('score1').value = pts;
      document.getElementById('score2').value = 157 - pts;
    } else {
      document.getElementById('score2').value = pts;
      document.getElementById('score1').value = 157 - pts;
    }
    state.matchTeam = 0;
    document.getElementById('match1-btn').classList.remove('active');
    document.getElementById('match2-btn').classList.remove('active');
  }

  function toggleMatch(team) {
    if (state.matchTeam === team) {
      state.matchTeam = 0;
    } else {
      state.matchTeam = team;
      // If match, winning team gets 157
      if (team === 1) { setScore(1, 157); }
      else { setScore(2, 157); }
    }
    document.getElementById('match1-btn').classList.toggle('active', state.matchTeam === 1);
    document.getElementById('match2-btn').classList.toggle('active', state.matchTeam === 2);
  }

  function addRound() {
    let s1 = parseInt(document.getElementById('score1').value);
    let s2 = parseInt(document.getElementById('score2').value);

    if (isNaN(s1) || isNaN(s2)) { alert('Bitte beide Punktzahlen eingeben.'); return; }
    if (s1 < 0 || s2 < 0) { alert('Keine negativen Punkte möglich.'); return; }

    const round = {
      s1, s2,
      match1: state.matchTeam === 1,
      match2: state.matchTeam === 2,
      factor: state.currentFactor || 1
    };

    state.scores.push(round);
    state.matchTeam = 0;
    state.currentFactor = 1;

    document.getElementById('score1').value = '';
    document.getElementById('score2').value = '';
    document.getElementById('match1-btn').classList.remove('active');
    document.getElementById('match2-btn').classList.remove('active');
    document.querySelectorAll('.factor-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.factor-btn[data-factor="1"]').classList.add('selected');

    renderGame();
    saveState();

    // Check win
    if (state.target > 0) {
      const t1 = getTotal(1);
      const t2 = getTotal(2);
      if (t1 >= state.target || t2 >= state.target) {
        const winTeam = t1 >= state.target && t1 >= t2 ? state.team1 : state.team2;
        const winScore = t1 >= state.target && t1 >= t2 ? t1 : t2;
        const loseScore = winTeam === state.team1 ? t2 : t1;
        setTimeout(() => showWin(winTeam, winScore, loseScore), 400);
      }
    }
  }

  function undoRound() {
    if (state.scores.length === 0) return;
    state.scores.pop();
    renderGame();
    saveState();
  }

  function showWin(team, score, loseScore) {
    document.getElementById('win-team-name').textContent = team;
    document.getElementById('win-score-display').textContent = `${score} : ${loseScore} Punkte`;
    document.getElementById('win-overlay').classList.add('show');
  }

  function closeWin() {
    document.getElementById('win-overlay').classList.remove('show');
  }

  function confirmReset() {
    state.scores = [];
    state.matchTeam = 0;
    state.currentFactor = 1;
    saveState();
    startGame(false);
  }

  // ── PWA INSTALL ──
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').classList.add('show');
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').classList.remove('show');
      });
    }
  }

  // ── SERVICE WORKER ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
