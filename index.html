<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1208">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jasstafel">
  <link rel="manifest" href="manifest.json">
  <title>Jasstafel</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080604;
      --felt: #1c3a2a;
      --felt-light: #224533;
      --gold: #d4a843;
      --gold-light: #f0c84a;
      --gold-dim: #8a6e28;
      --cream: #ffffff;
      --cream-dim: #b8a888;
      --red: #c0392b;
      --red-light: #ff5a47;
      --white: #ffffff;
      --shadow: rgba(0,0,0,0.6);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 20px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(28,58,42,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(28,58,42,0.3) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 12px 0 10px;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-top: 10px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.04em;
      text-shadow: 0 2px 12px rgba(201,168,76,0.4);
      line-height: 1;
    }

    .logo span { color: var(--red-light); }
    .logo small { font-size: 0.6em; font-weight: 400; color: var(--cream-dim); vertical-align: middle; }

    /* ── SETUP SCREEN ── */
    #setup-screen {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }

    .setup-section {
      background: rgba(28,58,42,0.35);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 16px;
    }

    .setup-section h3 {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-btn {
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(201,168,76,0.25);
      border-radius: 10px;
      padding: 12px 8px;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .mode-btn:active, .mode-btn.selected {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .mode-btn .mode-icon { font-size: 1.4rem; display: block; margin-bottom: 3px; }
    .mode-btn .mode-label { font-size: 0.8rem; display: block; color: var(--cream-dim); }

    .team-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .team-input-group { display: flex; flex-direction: column; gap: 5px; }

    .team-input-group label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold-dim);
    }

    .team-input-group input {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
      width: 100%;
      outline: none;
    }

    .team-input-group input:focus { border-color: var(--gold); }

    .target-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .target-btn {
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(201,168,76,0.25);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .target-btn.selected {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .start-btn {
      background: linear-gradient(135deg, #8b6914, var(--gold), #8b6914);
      border: none;
      border-radius: var(--radius);
      padding: 18px;
      color: #0f0c07;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .start-btn:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(201,168,76,0.2); }

    .resume-btn {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.15s;
    }

    .resume-btn:active { background: rgba(201,168,76,0.1); color: var(--cream); }

    /* ── GAME SCREEN ── */
    #game-screen { display: none; }

    .score-target {
      text-align: center;
      font-size: 0.8rem;
      color: var(--cream-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── ENTRY PANEL ── */
    .entry-panel {
      background: rgba(28,58,42,0.35);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
    }

    .entry-panel h3 {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .entry-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .entry-group { display: flex; flex-direction: column; gap: 4px; }

    .entry-group label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
    }

    .score-input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      padding: 10px;
      color: var(--white);
      font-family: 'Crimson Pro', serif;
      font-size: 1.8rem;
      font-weight: 600;
      width: 100%;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
    }

    .score-input:focus { border-color: var(--gold); background: rgba(0,0,0,0.55); }

    /* ── FAKTOR ── */
    .factor-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .factor-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      white-space: nowrap;
    }

    .factor-btn {
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(201,168,76,0.25);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 44px;
      text-align: center;
    }

    .factor-btn.selected {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    /* ── WEISE ── */
    .weise-section { margin-bottom: 10px; }

    .weise-header {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      margin-bottom: 6px;
    }

    .weise-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .weise-col { display: flex; flex-direction: column; gap: 4px; }

    .weise-col-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
      text-align: center;
    }

    .weise-list {
      min-height: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }

    .weise-tag {
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 0.9rem;
      color: var(--gold-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .weise-tag:active { background: rgba(192,57,43,0.25); border-color: var(--red-light); color: var(--red-light); }

    .weise-input-row { display: flex; gap: 5px; }

    .weise-input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 7px;
      padding: 7px 8px;
      color: var(--white);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      width: 100%;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
    }

    .weise-input:focus { border-color: var(--gold); }

    .weise-add-btn {
      background: rgba(201,168,76,0.2);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 7px;
      padding: 7px 12px;
      color: var(--gold-light);
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .weise-add-btn:active { background: rgba(201,168,76,0.4); }

    /* ── MATCH ── */
    .match-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .match-btn {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(192,57,43,0.3);
      border-radius: 8px;
      padding: 10px 6px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .match-btn.active {
      background: rgba(192,57,43,0.25);
      border-color: var(--red-light);
      color: var(--red-light);
    }

    .match-btn .match-icon { display: block; font-size: 1.1rem; }

    .add-round-btn {
      background: linear-gradient(135deg, #1c4a30, #2d6b45);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 10px;
      padding: 14px;
      color: var(--gold-light);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }

    .add-round-btn:active { transform: scale(0.97); opacity: 0.85; }

    /* ── SCOREBOARD ── */
    .scoreboard {
      background: rgba(28,58,42,0.35);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .scoreboard-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.3);
    }

    .team-header {
      padding: 12px 16px;
      text-align: center;
    }

    .team-header:first-child { border-right: 1px solid rgba(201,168,76,0.15); }

    .team-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--gold-light);
      font-weight: 700;
    }

    .team-total {
      font-size: 3.5rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--white);
      line-height: 1.1;
      text-shadow: 0 0 20px rgba(255,255,255,0.15);
    }

    .team-total.winning { color: var(--gold-light); text-shadow: 0 0 20px rgba(201,168,76,0.4); }
    .team-total.losing { color: var(--cream-dim); }

    .rounds-wrap {
      max-height: 220px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .round-row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr;
      align-items: center;
      padding: 7px 12px;
      border-top: 1px solid rgba(201,168,76,0.07);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

    .round-row:nth-child(even) { background: rgba(0,0,0,0.15); }

    .round-num {
      font-size: 0.72rem;
      color: var(--gold-dim);
      font-variant-numeric: tabular-nums;
    }

    .round-score {
      text-align: center;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      color: var(--cream);
    }

    .round-score.highlight { color: var(--gold-light); font-weight: 600; }
    .round-score.match-bonus { color: var(--red-light); font-weight: 700; }

    /* ── BOTTOM ACTIONS ── */
    .bottom-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .action-btn {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 12px 8px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .action-btn:active { background: rgba(255,255,255,0.08); color: var(--cream); }
    .action-btn .icon { display: block; font-size: 1.2rem; margin-bottom: 2px; }

    /* ── WIN OVERLAY ── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
    }

    #win-overlay.show { display: flex; }

    .win-card {
      background: linear-gradient(160deg, #1c3a2a, #0f1f16);
      border: 2px solid var(--gold);
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 0 60px rgba(201,168,76,0.25);
    }

    .win-trophy { font-size: 4rem; margin-bottom: 8px; }
    .win-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold-dim); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px; }
    .win-team { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; color: var(--gold-light); margin-bottom: 12px; }
    .win-score { font-size: 1rem; color: var(--cream-dim); margin-bottom: 24px; }

    .win-btn {
      background: linear-gradient(135deg, #8b6914, var(--gold), #8b6914);
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      color: #0f0c07;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 14px;
      align-items: center;
      gap: 12px;
    }

    #install-banner.show { display: flex; }
    #install-banner p { flex: 1; font-size: 0.85rem; color: var(--cream-dim); }
    #install-banner button {
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      color: #0f0c07;
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    /* ── MOLOTOV SETUP ── */
    .molotov-players {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .molotov-player-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .molotov-player-row input {
      flex: 1;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      outline: none;
    }

    .molotov-player-row input:focus { border-color: var(--gold); }

    .molotov-remove-btn {
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 8px;
      padding: 9px 13px;
      color: var(--red-light);
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .molotov-remove-btn:active { background: rgba(192,57,43,0.4); }

    .molotov-add-player-btn {
      background: rgba(201,168,76,0.12);
      border: 1px dashed rgba(201,168,76,0.35);
      border-radius: 8px;
      padding: 9px;
      color: var(--gold-dim);
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }

    .molotov-add-player-btn:active { background: rgba(201,168,76,0.2); color: var(--gold-light); }

    /* ── MOLOTOV GAME ── */
    #molotov-screen { display: none; }

    .molotov-entry {
      background: rgba(28,58,42,0.35);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
    }

    .molotov-entry h3 {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .molotov-entry-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .molotov-select {
      flex: 1;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--white);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .molotov-pts-input {
      width: 110px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      padding: 10px;
      color: var(--white);
      font-family: 'Crimson Pro', serif;
      font-size: 1.4rem;
      font-weight: 600;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
      flex-shrink: 0;
    }

    .molotov-pts-input:focus { border-color: var(--gold); }

    .molotov-save-btn {
      background: linear-gradient(135deg, #1c4a30, #2d6b45);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 10px;
      padding: 12px;
      color: var(--gold-light);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
    }

    .molotov-save-btn:active { transform: scale(0.97); opacity: 0.85; }

    /* ── MOLOTOV SCOREBOARD ── */
    .molotov-scoreboard {
      background: rgba(28,58,42,0.35);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .molotov-player-row-score {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-top: 1px solid rgba(201,168,76,0.07);
      gap: 8px;
    }

    .molotov-player-row-score:first-child { border-top: none; }

    .molotov-inline-input {
      width: 70px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 7px;
      padding: 5px 6px;
      color: var(--white);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
      flex-shrink: 0;
    }

    .molotov-inline-input:focus { border-color: var(--gold); }

    .molotov-inline-add {
      background: rgba(201,168,76,0.2);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 7px;
      padding: 5px 12px;
      color: var(--gold-light);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .molotov-inline-add:active { background: rgba(201,168,76,0.45); }

    .molotov-player-rank {
      font-size: 0.75rem;
      color: var(--gold-dim);
      width: 18px;
      flex-shrink: 0;
    }

    .molotov-player-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold-light);
      flex-shrink: 0;
      min-width: 70px;
    }

    .molotov-recent {
      flex: 1;
      font-size: 0.78rem;
      color: var(--cream-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .molotov-player-total {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .molotov-player-total.top { color: var(--gold-light); }

    /* ── HISTORY MODAL ── */
    .history-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 50;
      align-items: flex-end;
      justify-content: center;
    }

    .history-overlay.show { display: flex; }

    .history-modal {
      background: #0f1a0f;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 480px;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
    }

    .history-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .history-modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--gold-light);
    }

    .history-close-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--cream-dim);
      font-size: 1rem;
      cursor: pointer;
    }

    .history-total-line {
      font-size: 0.85rem;
      color: var(--cream-dim);
      margin-bottom: 10px;
    }

    .history-list {
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 4px;
      border-top: 1px solid rgba(201,168,76,0.07);
    }

    .history-item:first-child { border-top: none; }

    .history-item-num {
      font-size: 0.72rem;
      color: var(--gold-dim);
      width: 24px;
      flex-shrink: 0;
    }

    .history-item-pts {
      flex: 1;
      font-size: 1.1rem;
      color: var(--cream);
    }

    .history-delete-btn {
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--red-light);
      font-size: 0.85rem;
      cursor: pointer;
    }

    .history-delete-btn:active { background: rgba(192,57,43,0.5); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Jass<span>tafel</span> <small id="app-version"></small></div>
  </header>

  <div id="install-banner">
    <p>📲 Zum Home-Bildschirm hinzufügen für Offline-Nutzung</p>
    <button onclick="installApp()">Installieren</button>
  </div>

  <!-- SETUP SCREEN -->
  <div id="setup-screen">
    <div class="setup-section">
      <h3>Spielmodus</h3>
      <div class="mode-grid">
        <button class="mode-btn selected" data-mode="schieber" onclick="selectMode(this)">
          <span class="mode-icon">🃏</span>
          <span>Schieber</span>
          <span class="mode-label">2 × 2 Spieler</span>
        </button>
        <button class="mode-btn" data-mode="molotov" onclick="selectMode(this)">
          <span class="mode-icon">💣</span>
          <span>Molotov</span>
          <span class="mode-label">Alle Modi</span>
        </button>
      </div>
    </div>

    <div class="setup-section" id="schieber-setup-section">
      <h3>Teamnamen</h3>
      <div class="team-inputs">
        <div class="team-input-group">
          <label>Team 1</label>
          <input id="team1-name" type="text" placeholder="Team 1" maxlength="12" value="Team 1">
        </div>
        <div class="team-input-group">
          <label>Team 2</label>
          <input id="team2-name" type="text" placeholder="Team 2" maxlength="12" value="Team 2">
        </div>
      </div>
      <div style="margin-top:12px">
        <div style="font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">Ziel (Punkte)</div>
        <div class="target-options">
          <button class="target-btn" data-target="1000" onclick="selectTarget(this)">1000</button>
          <button class="target-btn" data-target="1500" onclick="selectTarget(this)">1500</button>
          <button class="target-btn" data-target="2000" onclick="selectTarget(this)">2000</button>
          <button class="target-btn selected" data-target="2500" onclick="selectTarget(this)">2500</button>
          <button class="target-btn" data-target="0" onclick="selectTarget(this)">Kein Ziel</button>
        </div>
      </div>
    </div>

    <div class="setup-section" id="molotov-setup-section" style="display:none">
      <h3>Spieler</h3>
      <div class="molotov-players" id="molotov-player-list"></div>
      <button class="molotov-add-player-btn" onclick="addMolotovPlayerField()">+ Spieler hinzufügen</button>
    </div>

    <button class="start-btn" onclick="startGame()">Spiel starten ♠</button>
    <button class="resume-btn" id="resume-btn" onclick="resumeGame()" style="display:none">↩ Zum laufenden Spiel zurück</button>
  </div>

  <!-- SCHIEBER GAME SCREEN -->
  <div id="game-screen">
    <div class="score-target" id="target-display"></div>

    <div class="entry-panel">
      <h3>Runde eintragen</h3>
      <div class="entry-row">
        <div class="entry-group">
          <label id="t1-label">Team 1</label>
          <input class="score-input" id="score1" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" min="0" max="257" oninput="autoBalance(1)">
        </div>
        <div class="entry-group">
          <label id="t2-label">Team 2</label>
          <input class="score-input" id="score2" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" min="0" max="257" oninput="autoBalance(2)">
        </div>
      </div>

      <div class="factor-row">
        <span class="factor-label">Faktor:</span>
        <button class="factor-btn selected" data-factor="1" onclick="selectFactor(this)">1×</button>
        <button class="factor-btn" data-factor="2" onclick="selectFactor(this)">2×</button>
        <button class="factor-btn" data-factor="3" onclick="selectFactor(this)">3×</button>
        <button class="factor-btn" data-factor="4" onclick="selectFactor(this)">4×</button>
      </div>

      <div class="weise-section">
        <div class="weise-header">Weise</div>
        <div class="weise-cols">
          <div class="weise-col">
            <div class="weise-col-label" id="weise-t1-label">Team 1</div>
            <div class="weise-list" id="weise-list-1"></div>
            <div class="weise-input-row">
              <input class="weise-input" id="weise-input-1" type="number" inputmode="numeric" placeholder="Pkt">
              <button class="weise-add-btn" onclick="addWeise(1)">+</button>
            </div>
          </div>
          <div class="weise-col">
            <div class="weise-col-label" id="weise-t2-label">Team 2</div>
            <div class="weise-list" id="weise-list-2"></div>
            <div class="weise-input-row">
              <input class="weise-input" id="weise-input-2" type="number" inputmode="numeric" placeholder="Pkt">
              <button class="weise-add-btn" onclick="addWeise(2)">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="match-row">
        <button class="match-btn" id="match1-btn" onclick="toggleMatch(1)">
          <span class="match-icon">💥</span>
          Match T1
        </button>
        <button class="match-btn" id="match2-btn" onclick="toggleMatch(2)">
          <span class="match-icon">💥</span>
          Match T2
        </button>
      </div>

      <button class="add-round-btn" onclick="addRound()">✓ Runde speichern</button>
    </div>

    <div class="scoreboard">
      <div class="scoreboard-header">
        <div class="team-header">
          <div class="team-name" id="t1-name">Team 1</div>
          <div class="team-total" id="t1-total">0</div>
        </div>
        <div class="team-header">
          <div class="team-name" id="t2-name">Team 2</div>
          <div class="team-total" id="t2-total">0</div>
        </div>
      </div>
      <div class="rounds-wrap" id="rounds-list"></div>
    </div>

    <div class="bottom-actions">
      <button class="action-btn" onclick="undoRound()">
        <span class="icon">↩️</span>
        Rückgängig
      </button>
      <button class="action-btn" onclick="showSetup()">
        <span class="icon">🔄</span>
        Neues Spiel
      </button>
    </div>
  </div>

  <!-- MOLOTOV GAME SCREEN -->
  <div id="molotov-screen" style="display:none">
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button class="factor-btn selected" id="sort-name-btn" onclick="setMolotovSort('name')">A–Z</button>
      <button class="factor-btn" id="sort-score-btn" onclick="setMolotovSort('score')">Punkte</button>
    </div>
    <div class="molotov-scoreboard" id="molotov-scoreboard"></div>
    <div class="bottom-actions">
      <button class="action-btn" onclick="resetMolotovScores()">
        <span class="icon">🗑️</span>
        Punkte reset
      </button>
      <button class="action-btn" onclick="showSetup()">
        <span class="icon">🔄</span>
        Neues Spiel
      </button>
    </div>
  </div>
</div>

<!-- Win Overlay -->
<div id="win-overlay">
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <div class="win-title">Gewinner</div>
    <div class="win-team" id="win-team-name">Team 1</div>
    <div class="win-score" id="win-score-display"></div>
    <button class="win-btn" onclick="closeWin()">Weiter spielen</button>
  </div>
</div>

<!-- History Modal -->
<div class="history-overlay" id="history-overlay">
  <div class="history-modal">
    <div class="history-modal-header">
      <div class="history-modal-title" id="history-modal-title">Spieler</div>
      <button class="history-close-btn" onclick="closeHistory()">✕ Schliessen</button>
    </div>
    <div class="history-total-line" id="history-total-line"></div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script>
  // ── STATE ──
  let state = {
    mode: 'schieber',
    team1: 'Team 1',
    team2: 'Team 2',
    target: 2500,
    scores: [],
    matchTeam: 0,
    currentFactor: 1,
    currentWeisen1: [],
    currentWeisen2: [],
    molotovPlayers: ['Spieler 1', 'Spieler 2'],
    molotovScores: {} // { playerName: [pts, pts, ...] }
  };

  const saved = localStorage.getItem('jasstafel_state');
  if (saved) {
    try { state = { ...state, ...JSON.parse(saved) }; } catch(e) {}
  }

  if (state.scores && state.scores.length > 0) {
    document.getElementById('resume-btn').style.display = 'block';
  }

  function saveState() {
    localStorage.setItem('jasstafel_state', JSON.stringify(state));
  }

  // ── MOLOTOV PLAYER SETUP ──
  function renderMolotovPlayerFields() {
    const list = document.getElementById('molotov-player-list');
    list.innerHTML = '';
    state.molotovPlayers.forEach((name, i) => {
      const row = document.createElement('div');
      row.className = 'molotov-player-row';
      row.innerHTML = `
        <input type="text" value="${name}" maxlength="16" placeholder="Spieler ${i+1}"
          oninput="state.molotovPlayers[${i}] = this.value">
        ${state.molotovPlayers.length > 2
          ? `<button class="molotov-remove-btn" onclick="removeMolotovPlayer(${i})">✕</button>`
          : ''}
      `;
      list.appendChild(row);
    });
  }

  function addMolotovPlayerField() {
    if (state.molotovPlayers.length >= 12) return;
    state.molotovPlayers.push(`Spieler ${state.molotovPlayers.length + 1}`);
    renderMolotovPlayerFields();
  }

  function removeMolotovPlayer(i) {
    state.molotovPlayers.splice(i, 1);
    renderMolotovPlayerFields();
  }

  // ── SETUP ──
  function selectMode(btn) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.mode = btn.dataset.mode;
    const isMolotov = state.mode === 'molotov';
    document.getElementById('schieber-setup-section').style.display = isMolotov ? 'none' : 'block';
    document.getElementById('molotov-setup-section').style.display = isMolotov ? 'block' : 'none';
    if (isMolotov) renderMolotovPlayerFields();
  }

  // Init section visibility on load
  if (state.mode === 'molotov') {
    document.getElementById('schieber-setup-section').style.display = 'none';
    document.getElementById('molotov-setup-section').style.display = 'block';
    document.querySelectorAll('.mode-btn').forEach(b => {
      if (b.dataset.mode === 'molotov') b.classList.add('selected');
      else b.classList.remove('selected');
    });
    renderMolotovPlayerFields();
  }

  function selectTarget(btn) {
    document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.target = parseInt(btn.dataset.target);
  }

  function selectFactor(btn) {
    document.querySelectorAll('.factor-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.currentFactor = parseInt(btn.dataset.factor);
  }

  function addWeise(team) {
    const input = document.getElementById(`weise-input-${team}`);
    const val = parseInt(input.value);
    if (isNaN(val) || val <= 0) return;
    if (team === 1) state.currentWeisen1.push(val);
    else state.currentWeisen2.push(val);
    input.value = '';
    renderWeisen();
  }

  function removeWeise(team, index) {
    if (team === 1) state.currentWeisen1.splice(index, 1);
    else state.currentWeisen2.splice(index, 1);
    renderWeisen();
  }

  function renderWeisen() {
    [1, 2].forEach(team => {
      const list = document.getElementById(`weise-list-${team}`);
      const weisen = team === 1 ? state.currentWeisen1 : state.currentWeisen2;
      list.innerHTML = '';
      weisen.forEach((w, i) => {
        const tag = document.createElement('span');
        tag.className = 'weise-tag';
        tag.innerHTML = `${w} <small>✕</small>`;
        tag.onclick = () => removeWeise(team, i);
        list.appendChild(tag);
      });
    });
  }

  function resetWeisen() {
    state.currentWeisen1 = [];
    state.currentWeisen2 = [];
    document.getElementById('weise-input-1').value = '';
    document.getElementById('weise-input-2').value = '';
    renderWeisen();
  }

  function startGame(restore = false) {
    if (state.mode === 'molotov') {
      if (!restore) {
        // Read player names from input fields
        const inputs = document.querySelectorAll('#molotov-player-list input');
        state.molotovPlayers = [...inputs].map(i => i.value.trim() || 'Spieler');
        state.molotovScores = {};
        state.molotovPlayers.forEach(p => state.molotovScores[p] = []);
      }
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('molotov-screen').style.display = 'block';
      renderMolotovScoreboard();
      saveState();
      return;
    }

    if (!restore) {
      state.team1 = document.getElementById('team1-name').value.trim() || 'Team 1';
      state.team2 = document.getElementById('team2-name').value.trim() || 'Team 2';
      state.scores = [];
      state.matchTeam = 0;
      state.currentFactor = 1;
      state.currentWeisen1 = [];
      state.currentWeisen2 = [];
    }

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('molotov-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';

    document.getElementById('t1-name').textContent = state.team1;
    document.getElementById('t2-name').textContent = state.team2;
    document.getElementById('t1-label').textContent = state.team1;
    document.getElementById('t2-label').textContent = state.team2;
    document.getElementById('weise-t1-label').textContent = state.team1;
    document.getElementById('weise-t2-label').textContent = state.team2;

    if (state.target > 0) {
      document.getElementById('target-display').textContent = `Ziel: ${state.target} Punkte · ${state.mode.charAt(0).toUpperCase() + state.mode.slice(1)}`;
    } else {
      document.getElementById('target-display').textContent = state.mode.charAt(0).toUpperCase() + state.mode.slice(1);
    }

    renderGame();
    saveState();
  }

  function showSetup() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('molotov-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('team1-name').value = state.team1;
    document.getElementById('team2-name').value = state.team2;
    const isMolotov = state.mode === 'molotov';
    document.getElementById('schieber-setup-section').style.display = isMolotov ? 'none' : 'block';
    document.getElementById('molotov-setup-section').style.display = isMolotov ? 'block' : 'none';
    if (isMolotov) renderMolotovPlayerFields();
    const hasGame = isMolotov
      ? state.molotovPlayers && Object.values(state.molotovScores || {}).some(s => s.length > 0)
      : state.scores && state.scores.length > 0;
    document.getElementById('resume-btn').style.display = hasGame ? 'block' : 'none';
  }

  function resumeGame() {
    document.getElementById('setup-screen').style.display = 'none';
    if (state.mode === 'molotov') {
      document.getElementById('molotov-screen').style.display = 'block';
      renderMolotovScoreboard();
    } else {
      document.getElementById('game-screen').style.display = 'block';
    }
  }

  // ── MOLOTOV GAME ──
  let molotovSort = 'name';

  function setMolotovSort(by) {
    molotovSort = by;
    document.getElementById('sort-name-btn').classList.toggle('selected', by === 'name');
    document.getElementById('sort-score-btn').classList.toggle('selected', by === 'score');
    renderMolotovScoreboard();
  }

  function getMolotovTotal(player) {
    return (state.molotovScores[player] || []).reduce((a, b) => a + b, 0);
  }

  function renderMolotovScoreboard() {
    const board = document.getElementById('molotov-scoreboard');
    const sorted = [...state.molotovPlayers].sort((a, b) =>
      molotovSort === 'score'
        ? getMolotovTotal(b) - getMolotovTotal(a)
        : a.localeCompare(b)
    );
    const maxTotal = getMolotovTotal(sorted[0]);
    board.innerHTML = '';
    sorted.forEach((p, rank) => {
      const scores = state.molotovScores[p] || [];
      const total = getMolotovTotal(p);
      const recent = scores.slice(-5);
      const inputId = `molotov-inline-${rank}`;

      const row = document.createElement('div');
      row.className = 'molotov-player-row-score';

      // Name (klickbar für Historie)
      const nameEl = document.createElement('div');
      nameEl.className = 'molotov-player-name';
      nameEl.textContent = p;
      nameEl.style.cursor = 'pointer';
      nameEl.onclick = () => openHistory(p);

      // Eingabefeld
      const inp = document.createElement('input');
      inp.className = 'molotov-inline-input';
      inp.id = inputId;
      inp.type = 'number';
      inp.inputMode = 'numeric';
      inp.placeholder = '0';
      inp.min = '0';
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') addMolotovInline(p, inputId); });

      // + Button
      const addBtn = document.createElement('button');
      addBtn.className = 'molotov-inline-add';
      addBtn.textContent = '+';
      addBtn.onclick = () => addMolotovInline(p, inputId);

      // Letzte Einträge
      const recentEl = document.createElement('div');
      recentEl.className = 'molotov-recent';
      recentEl.textContent = recent.length ? `(${recent.join(', ')})` : '';

      // Total
      const totalEl = document.createElement('div');
      totalEl.className = 'molotov-player-total' + (total === maxTotal && total > 0 ? ' top' : '');
      totalEl.textContent = total;

      row.appendChild(nameEl);
      row.appendChild(inp);
      row.appendChild(addBtn);
      row.appendChild(recentEl);
      row.appendChild(totalEl);
      board.appendChild(row);
    });
  }

  function resetMolotovScores() {
    if (!confirm('Alle Punkte löschen?')) return;
    state.molotovPlayers.forEach(p => state.molotovScores[p] = []);
    renderMolotovScoreboard();
    saveState();
  }

  function addMolotovInline(player, inputId) {
    const inp = document.getElementById(inputId);
    const pts = parseInt(inp.value);
    if (isNaN(pts) || pts < 0) return;
    if (!state.molotovScores[player]) state.molotovScores[player] = [];
    state.molotovScores[player].push(pts);
    inp.value = '';
    renderMolotovScoreboard();
    saveState();
  }

  // ── HISTORY MODAL ──
  let historyPlayer = null;

  function openHistory(player) {
    historyPlayer = player;
    document.getElementById('history-modal-title').textContent = player;
    renderHistoryList();
    document.getElementById('history-overlay').classList.add('show');
  }

  function renderHistoryList() {
    const scores = state.molotovScores[historyPlayer] || [];
    const total = scores.reduce((a, b) => a + b, 0);
    document.getElementById('history-total-line').textContent = `Total: ${total} Punkte · ${scores.length} Einträge`;
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    [...scores].reverse().forEach((pts, i) => {
      const realIdx = scores.length - 1 - i;
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-item-num">${scores.length - i}</div>
        <div class="history-item-pts">${pts} Punkte</div>
        <button class="history-delete-btn" onclick="deleteHistoryEntry(${realIdx})">Löschen</button>
      `;
      list.appendChild(item);
    });
  }

  function deleteHistoryEntry(idx) {
    state.molotovScores[historyPlayer].splice(idx, 1);
    renderHistoryList();
    renderMolotovScoreboard();
    saveState();
  }

  function closeHistory() {
    historyPlayer = null;
    document.getElementById('history-overlay').classList.remove('show');
  }

  // Resume molotov game on page load if needed
  if (state.mode === 'molotov' && state.molotovPlayers && state.molotovScores &&
      Object.values(state.molotovScores).some(s => s.length > 0)) {
    document.getElementById('resume-btn').style.display = 'block';
  }

  // ── GAME LOGIC ──
  function getTotal(team) {
    return state.scores.reduce((sum, r) => {
      const factor = r.factor || 1;
      const base = team === 1 ? r.s1 : r.s2;
      const weisen = team === 1 ? (r.weisen1 || []) : (r.weisen2 || []);
      const weisSum = weisen.reduce((a, b) => a + b, 0);
      return sum + (base + weisSum) * factor;
    }, 0);
  }

  function renderGame() {
    const t1 = getTotal(1);
    const t2 = getTotal(2);

    const t1El = document.getElementById('t1-total');
    const t2El = document.getElementById('t2-total');
    t1El.textContent = t1;
    t2El.textContent = t2;
    t1El.className = 'team-total' + (t1 > t2 ? ' winning' : t1 < t2 ? ' losing' : '');
    t2El.className = 'team-total' + (t2 > t1 ? ' winning' : t2 < t1 ? ' losing' : '');

    const list = document.getElementById('rounds-list');
    list.innerHTML = '';
    [...state.scores].reverse().forEach((r, i) => {
      const roundNum = state.scores.length - i;
      const row = document.createElement('div');
      row.className = 'round-row';

      const numEl = document.createElement('div');
      numEl.className = 'round-num';
      numEl.textContent = roundNum + (r.factor > 1 ? ` ×${r.factor}` : '');

      const w1 = r.weisen1 || [];
      const s1El = document.createElement('div');
      s1El.className = 'round-score' + (r.s1 > r.s2 ? ' highlight' : '') + (r.match1 ? ' match-bonus' : '');
      s1El.textContent = r.s1 + (w1.length ? ` (${w1.join('+')})` : '');

      const w2 = r.weisen2 || [];
      const s2El = document.createElement('div');
      s2El.className = 'round-score' + (r.s2 > r.s1 ? ' highlight' : '') + (r.match2 ? ' match-bonus' : '');
      s2El.textContent = r.s2 + (w2.length ? ` (${w2.join('+')})` : '');

      row.appendChild(numEl);
      row.appendChild(s1El);
      row.appendChild(s2El);
      list.appendChild(row);
    });
  }

  function autoBalance(changed) {
    if (changed === 1) {
      const s1 = parseInt(document.getElementById('score1').value);
      if (!isNaN(s1) && s1 >= 0)
        document.getElementById('score2').value = s1 > 157 ? 0 : 157 - s1;
    } else {
      const s2 = parseInt(document.getElementById('score2').value);
      if (!isNaN(s2) && s2 >= 0)
        document.getElementById('score1').value = s2 > 157 ? 0 : 157 - s2;
    }
  }

  function toggleMatch(team) {
    if (state.matchTeam === team) {
      state.matchTeam = 0;
      document.getElementById('score1').value = '';
      document.getElementById('score2').value = '';
    } else {
      state.matchTeam = team;
      if (team === 1) { document.getElementById('score1').value = 257; document.getElementById('score2').value = 0; }
      else            { document.getElementById('score2').value = 257; document.getElementById('score1').value = 0; }
    }
    document.getElementById('match1-btn').classList.toggle('active', state.matchTeam === 1);
    document.getElementById('match2-btn').classList.toggle('active', state.matchTeam === 2);
  }

  function addRound() {
    const s1 = parseInt(document.getElementById('score1').value);
    const s2 = parseInt(document.getElementById('score2').value);
    if (isNaN(s1) || isNaN(s2)) { alert('Bitte beide Punktzahlen eingeben.'); return; }
    if (s1 < 0 || s2 < 0) { alert('Keine negativen Punkte möglich.'); return; }

    state.scores.push({
      s1, s2,
      match1: state.matchTeam === 1,
      match2: state.matchTeam === 2,
      factor: state.currentFactor || 1,
      weisen1: [...state.currentWeisen1],
      weisen2: [...state.currentWeisen2]
    });

    state.matchTeam = 0;
    state.currentFactor = 1;
    document.getElementById('score1').value = '';
    document.getElementById('score2').value = '';
    document.getElementById('match1-btn').classList.remove('active');
    document.getElementById('match2-btn').classList.remove('active');
    document.querySelectorAll('.factor-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.factor-btn[data-factor="1"]').classList.add('selected');
    resetWeisen();
    renderGame();
    saveState();

    if (state.target > 0) {
      const t1 = getTotal(1), t2 = getTotal(2);
      if (t1 >= state.target || t2 >= state.target) {
        const win = t1 >= state.target && t1 >= t2;
        setTimeout(() => showWin(win ? state.team1 : state.team2, win ? t1 : t2, win ? t2 : t1), 400);
      }
    }
  }

  function undoRound() {
    if (state.scores.length === 0) return;
    state.scores.pop();
    renderGame();
    saveState();
  }

  function showWin(team, score, loseScore) {
    document.getElementById('win-team-name').textContent = team;
    document.getElementById('win-score-display').textContent = `${score} : ${loseScore} Punkte`;
    document.getElementById('win-overlay').classList.add('show');
  }

  function closeWin() {
    document.getElementById('win-overlay').classList.remove('show');
  }

  // ── PWA INSTALL ──
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').classList.add('show');
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').classList.remove('show');
      });
    }
  }

  // ── SERVICE WORKER + VERSION ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => {
      fetch('sw.js?nocache=' + Date.now())
        .then(r => r.text())
        .then(text => {
          const match = text.match(/const VERSION\s*=\s*'([^']+)'/);
          if (match) document.getElementById('app-version').textContent = `(${match[1]})`;
        });
    });
  }
</script>
</body>
</html>
